services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nullhorizon
      POSTGRES_PASSWORD: nullhorizon
      POSTGRES_DB: nullhorizon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nullhorizon -d nullhorizon"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://nullhorizon:nullhorizon@postgres:5432/nullhorizon
      REDIS_URL: redis://redis:6379/0
      EXECUTION_PROVIDER: fake
      CONTENT_BUNDLE_DIR: /content/bundle
      API_VERSION: 0.1.0
    ports:
      - "8000:8000"
    volumes:
      - ../../content/build/bundles/dev:/content/bundle:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
