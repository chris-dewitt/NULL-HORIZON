name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy
        run: mypy api
      - name: Pytest
        run: pytest -q

  content:
    name: Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-content.txt
      - name: Install content tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-content.txt
      - name: Validate and build bundle
        run: |
          python scripts/validate_content.py
          python scripts/build_bundle.py --channel dev
      - name: Content tests
        run: pytest -q scripts/tests

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Accept licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Lint, unit tests, and debug assemble
        run: ./gradlew --no-daemon lintDebug test assembleDebug

  repo-guards:
    name: Repository guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files exist
        run: |
          test -f AGENTS.md
          test -f docs/PRODUCT_SPEC.md
          test -f docs/ADR/0000-template.md
          test -f scripts/check.sh
          test -f backend/api/app/main.py
          test -f android-app/app/src/main/java/com/nullhorizon/app/MainActivity.kt
          test -f content/schema/mission.schema.json
          test -f scripts/validate_content.py
          test -f android-app/app/src/main/assets/content/manifest.json
      - name: Basic secret scan
        run: |
          if git grep -nE 'BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY|AKIA[0-9A-Z]{16}|xox[baprs]-[0-9A-Za-z-]{10,}' -- \
            ':(exclude).env.example' \
            ':(exclude)**/*.md'; then
            echo "Potential secrets detected" >&2
            exit 1
          fi
