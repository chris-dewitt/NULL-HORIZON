schema_version: 1
mission_id: cpp.classes.01
version: 1.0.0
chapter_id: reactor_kernel
title: Thermal Class
summary: Initialize a thermal controller flag.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: cpp.classes
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.cpp.classes.01.briefing
  success_dialogue_id: dialogue.cpp.classes.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 152
  workspace:
    files:
      - path: /workspace/thermal.py
        editable: true
        content: |
          def solve() -> bool:
              ready = False
              return ready
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from thermal import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/thermal.py: "ready = True"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/thermal.py: "ready = False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required C++ concept fix.
    visible: true
    assert:
      file_contains:/workspace/thermal.py: "ready = True"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Start ready.
  - level: 2
    text: ready{true}
  - level: 3
    text: Fix the default.
  - level: 4
    text: Run fixtures.

rewards:
  clearance_points: 35
  mastery:
    cpp.classes: 1
  unlocks:
    - lore.cpp.classes.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
