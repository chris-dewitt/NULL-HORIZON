schema_version: 1
mission_id: drone.encapsulate.01
version: 1.0.0
chapter_id: drone_foundry
title: Encapsulate Battery
summary: Hide battery behind a safe accessor.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: oop.encapsulation
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.drone.encapsulate.01.briefing
  success_dialogue_id: dialogue.drone.encapsulate.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 91
  workspace:
    files:
      - path: /workspace/drone.py
        editable: true
        content: |
          class Drone:
              def __init__(self):
                  self.battery = 10

          def solve() -> bool:
              d = Drone()
              return getattr(d, 'battery_level', None) == 10
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from drone import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/drone.py: "battery_level = 10"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/drone.py: "self.battery = 10"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/drone.py: "battery_level = 10"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Prefer a battery_level API.
  - level: 2
    text: Rename or wrap battery.
  - level: 3
    text: Expose battery_level.
  - level: 4
    text: Keep access safe.

rewards:
  clearance_points: 35
  mastery:
    oop.encapsulation: 1
  unlocks:
    - lore.drone.encapsulate.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
