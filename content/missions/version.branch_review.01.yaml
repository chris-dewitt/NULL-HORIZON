schema_version: 1
mission_id: version.branch_review.01
version: 1.0.0
chapter_id: version_vault
title: Branch Review Gate
summary: Open a repair branch and pass a code-review checklist before merge.
difficulty: challenge

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - git.merge

skills:
  primary: git.review
  secondary:
    - git.branch
    - git.merge

narrative:
  briefing_dialogue_id: dialogue.version.branch_review.01.briefing
  success_dialogue_id: dialogue.version.branch_review.01.success

tools:
  - systems_panel

environment:
  schema_version: 1
  template_id: local.state.v1
  seed: 62
  initial_state:
    branch: main
    review: pending
    approved: False
  actions:
    - id: cut_branch
      label: Create repair branch
      effects:
        branch: repair
    - id: request_review
      label: Request review
      requires:
        branch: repair
      effects:
        review: requested
    - id: approve
      label: Approve after checklist
      requires:
        review: requested
      effects:
        review: approved
        approved: True

objectives:
  - id: branch
    type: state_assertion
    description: Create the repair branch.
    visible: true
    assert:
      branch: repair
  - id: req
    type: state_assertion
    description: Request review.
    visible: true
    assert:
      review: requested
  - id: ok
    type: state_assertion
    description: Approve the checklist.
    visible: true
    assert:
      approved: True

hints:
  - level: 1
    text: Leave main; cut a repair branch.
  - level: 2
    text: Request review next.
  - level: 3
    text: Approve only after the checklist.
  - level: 4
    text: Do not skip review.

rewards:
  clearance_points: 50
  mastery:
    git.review: 1
    git.branch: 1
  unlocks:
    - lore.version.branch_review.01

completion:
  mode: all
  objective_ids:
    - branch
    - req
    - ok
