schema_version: 1
mission_id: nav.graphs.01
version: 1.0.0
chapter_id: navigation_array
title: Graph Neighbor Walk
summary: Confirm BFS neighbor expansion order.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - dsa.trees

skills:
  primary: dsa.graphs
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.nav.graphs.01.briefing
  success_dialogue_id: dialogue.nav.graphs.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 105
  workspace:
    files:
      - path: /workspace/nav.py
        editable: true
        content: |
          def solve() -> bool:
              mode = 'dfs'
              return mode == 'bfs'
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from nav import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/nav.py: "bfs"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/nav.py: "dfs"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/nav.py: "bfs"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Use BFS for debris layers.
  - level: 2
    text: mode = 'bfs'
  - level: 3
    text: Not DFS here.
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    dsa.graphs: 1
  unlocks:
    - lore.nav.graphs.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
