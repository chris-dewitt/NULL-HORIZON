schema_version: 1
mission_id: automation.loops.01
version: 1.0.0
chapter_id: automation_lab
title: Loop the Sensors
summary: Sum sensor readings with a loop.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - python.conditionals

skills:
  primary: python.loops
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.automation.loops.01.briefing
  success_dialogue_id: dialogue.automation.loops.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 81
  workspace:
    files:
      - path: /workspace/solve.py
        editable: true
        content: |
          def solve() -> bool:
              total = 0
              readings = [1, 2, 3]
              pass
              return total == 6
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from solve import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/solve.py: "for"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/solve.py: "pass"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/solve.py: "for"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Iterate readings.
  - level: 2
    text: Add each value to total.
  - level: 3
    text: Use a for loop.
  - level: 4
    text: Ensure total == 6.

rewards:
  clearance_points: 35
  mastery:
    python.loops: 1
  unlocks:
    - lore.automation.loops.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
