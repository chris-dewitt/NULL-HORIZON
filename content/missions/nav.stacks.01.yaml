schema_version: 1
mission_id: nav.stacks.01
version: 1.0.0
chapter_id: navigation_array
title: Stack Undo
summary: Use stack push/pop semantics for undo.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - dsa.lists

skills:
  primary: dsa.stacks
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.nav.stacks.01.briefing
  success_dialogue_id: dialogue.nav.stacks.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 101
  workspace:
    files:
      - path: /workspace/nav.py
        editable: true
        content: |
          def solve() -> bool:
              stack = []
              stack.append('a')
              stack.append('b')
              stack.append('c')
              return stack[-1] == 'b'
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from nav import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/nav.py: "pop()"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/nav.py: "append('c')"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/nav.py: "pop()"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Undo the last push.
  - level: 2
    text: Use pop.
  - level: 3
    text: After pop, top is b.
  - level: 4
    text: stack.pop()

rewards:
  clearance_points: 35
  mastery:
    dsa.stacks: 1
  unlocks:
    - lore.nav.stacks.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
