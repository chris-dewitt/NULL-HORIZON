schema_version: 1
mission_id: archive.aggregate.01
version: 1.0.0
chapter_id: archive_core
title: Count by Status
summary: Aggregate how many crew rows exist per status.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - sql.filter

skills:
  primary: sql.aggregate
  secondary:
    - sql.group

narrative:
  briefing_dialogue_id: dialogue.archive.aggregate.01.briefing
  success_dialogue_id: dialogue.archive.aggregate.01.success

tools:
  - sql

environment:
  schema_version: 1
  template_id: sql.sqlite.v1
  seed: 72
  databases:
    - id: archive
      policy: select_only
      seed_sql: |
        CREATE TABLE crew (crew_id INTEGER PRIMARY KEY, callsign TEXT, role TEXT, status TEXT, deck TEXT);
        CREATE TABLE pods (pod_id INTEGER PRIMARY KEY, deck TEXT, occupied INTEGER);
        INSERT INTO pods VALUES (1,'A',1),(2,'A',1),(3,'B',1),(4,'B',0);
        INSERT INTO crew VALUES
         (1,'ORION','navigator','active','A'),
         (2,'VEGA','engineer','active','A'),
         (3,'KELL','medic','missing','B'),
         (4,'RIN','engineer','missing','B'),
         (5,'NYX','unknown','ghost','B');
objectives:
  - id: counts
    type: sql_result
    description: Count crew rows grouped by status.
    visible: true
    assert:
      query_contains: GROUP
      columns: status,count
      row_count: "3"

hints:
  - level: 1
    text: Use COUNT and GROUP BY.
  - level: 2
    text: Select status and the count.
  - level: 3
    text: Alias the count column as count.
  - level: 4
    text: SELECT status, COUNT(*) AS count FROM crew GROUP BY status;

rewards:
  clearance_points: 35
  mastery:
    sql.aggregate: 1
  unlocks:
    - lore.archive.aggregate.01

completion:
  mode: all
  objective_ids:
    - counts
