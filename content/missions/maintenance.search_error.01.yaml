schema_version: 1
mission_id: maintenance.search_error.01
version: 1.0.0
chapter_id: maintenance_deck
title: Search for Errors
summary: Use grep to locate ERROR lines in a diagnostics file.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - linux.inspection

skills:
  primary: linux.search
  secondary:
    - linux.inspection

narrative:
  briefing_dialogue_id: dialogue.maintenance.search_error.01.briefing
  success_dialogue_id: dialogue.maintenance.search_error.01.success

tools:
  - terminal

environment:
  schema_version: 1
  template_id: terminal.vfs.v1
  seed: 53
  filesystem:
    cwd: /var/log
    entries:
      - path: /var/log
        type: dir
      - path: /var/log/diag.txt
        type: file
        content: |
          INFO boot
          WARN retry
          ERROR seal leak
          INFO idle

objectives:
  - id: grep_error
    type: command_output
    description: Grep for ERROR in diag.txt.
    visible: true
    assert:
      last_command: grep ERROR diag.txt
      stdout_contains: seal leak
      exit_code: 0

hints:
  - level: 1
    text: Stay in /var/log.
  - level: 2
    text: Use grep with pattern ERROR.
  - level: 3
    text: Target diag.txt.
  - level: 4
    text: grep ERROR diag.txt

rewards:
  clearance_points: 30
  mastery:
    linux.search: 1
  unlocks:
    - lore.maintenance.search_error.01

completion:
  mode: all
  objective_ids:
    - grep_error
