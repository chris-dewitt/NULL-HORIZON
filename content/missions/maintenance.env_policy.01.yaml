schema_version: 1
mission_id: maintenance.env_policy.01
version: 1.0.0
chapter_id: maintenance_deck
title: Permissions Policy
summary: Apply least-privilege environment settings for a maintenance job.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - linux.inspection

skills:
  primary: linux.permissions
  secondary:
    - linux.inspection

narrative:
  briefing_dialogue_id: dialogue.maintenance.env_policy.01.briefing
  success_dialogue_id: dialogue.maintenance.env_policy.01.success

tools:
  - systems_panel

environment:
  schema_version: 1
  template_id: local.state.v1
  seed: 54
  initial_state:
    job_user: root
    env_mode: permissive
    policy_ok: False
  actions:
    - id: drop_root
      label: Run job as maint user
      effects:
        job_user: maint
    - id: tighten_env
      label: Set restricted environment
      requires:
        job_user: maint
      effects:
        env_mode: restricted
        policy_ok: True

objectives:
  - id: user
    type: state_assertion
    description: Drop from root to maint.
    visible: true
    assert:
      job_user: maint
  - id: env
    type: state_assertion
    description: Restrict the job environment.
    visible: true
    assert:
      env_mode: restricted
      policy_ok: True

hints:
  - level: 1
    text: Do not leave the job as root.
  - level: 2
    text: Switch to the maint user.
  - level: 3
    text: Then restrict the environment.
  - level: 4
    text: Both changes are required.

rewards:
  clearance_points: 25
  mastery:
    linux.permissions: 1
    linux.inspection: 1
  unlocks:
    - lore.maintenance.env_policy.01

completion:
  mode: all
  objective_ids:
    - user
    - env
