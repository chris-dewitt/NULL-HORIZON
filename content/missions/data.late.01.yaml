schema_version: 1
mission_id: data.late.01
version: 1.0.0
chapter_id: data_foundry
title: Late-Arriving Frames
summary: Accept late frames without double-counting already loaded batches.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - data.quality

skills:
  primary: data.late
  secondary:
    - data.quality

narrative:
  briefing_dialogue_id: dialogue.data.late.01.briefing
  success_dialogue_id: dialogue.data.late.01.success

tools:
  - systems_panel

environment:
  schema_version: 1
  template_id: local.state.v1
  seed: 144
  initial_state:
    policy: drop_late
    idempotent: False
    ok: False
  actions:
    - id: accept_late
      label: Accept late frames into side path
      effects:
        policy: side_path
    - id: dedupe
      label: Dedupe by frame id
      requires:
        policy: side_path
      effects:
        idempotent: True
        ok: True

objectives:
  - id: policy
    type: state_assertion
    description: Change drop policy to a side path.
    visible: true
    assert:
      policy: side_path
  - id: dedupe
    type: state_assertion
    description: Dedupe late frames.
    visible: true
    assert:
      idempotent: True
      ok: True

hints:
  - level: 1
    text: Do not silently drop late frames.
  - level: 2
    text: Use a side path.
  - level: 3
    text: Dedupe by id.
  - level: 4
    text: Keep loads idempotent.

rewards:
  clearance_points: 25
  mastery:
    data.late: 1
    data.quality: 1
  unlocks:
    - lore.data.late.01

completion:
  mode: all
  objective_ids:
    - policy
    - dedupe
