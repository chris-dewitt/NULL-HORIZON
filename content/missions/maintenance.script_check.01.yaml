schema_version: 1
mission_id: maintenance.script_check.01
version: 1.0.0
chapter_id: maintenance_deck
title: Simple Health Script
summary: Repair a tiny health-check script used by deck automation.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - linux.search

skills:
  primary: linux.scripts
  secondary:
    - python.functions

narrative:
  briefing_dialogue_id: dialogue.maintenance.script_check.01.briefing
  success_dialogue_id: dialogue.maintenance.script_check.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 55
  workspace:
    files:
      - path: /workspace/health.py
        editable: true
        content: |
          def solve() -> bool:
              status = 'degraded'
              return status == "ok"
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from health import solve


          def test_health():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/health.py: "status = 'ok'"
          result:
            status: completed
            tests:
              - id: test_health
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/health.py: "status = 'degraded'"
          result:
            status: completed
            tests:
              - id: test_health
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_health
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/health.py: "status = 'ok'"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Open health.py.
  - level: 2
    text: status is wrong.
  - level: 3
    text: Set status to ok.
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    linux.scripts: 1
  unlocks:
    - lore.maintenance.script_check.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
