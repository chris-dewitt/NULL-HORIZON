schema_version: 1
mission_id: testing.doubles.01
version: 1.0.0
chapter_id: verification_chamber
title: Test Double Sensor
summary: Replace a flaky sensor with a test double.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - testing.aaa

skills:
  primary: testing.doubles
  secondary:
    - testing.aaa

narrative:
  briefing_dialogue_id: dialogue.testing.doubles.01.briefing
  success_dialogue_id: dialogue.testing.doubles.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 122
  workspace:
    files:
      - path: /workspace/double.py
        editable: true
        content: |
          def solve() -> bool:
              sensor = 'live'
              return sensor == 'stub'
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from double import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/double.py: "stub"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/double.py: "live"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/double.py: "stub"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Do not call the live sensor.
  - level: 2
    text: Use a stub double.
  - level: 3
    text: sensor = 'stub'
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    testing.doubles: 1
  unlocks:
    - lore.testing.doubles.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
