schema_version: 1
mission_id: automation.files.01
version: 1.0.0
chapter_id: automation_lab
title: Parse Sensor File
summary: Parse a newline-separated sensor file string.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - python.collections

skills:
  primary: python.files
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.automation.files.01.briefing
  success_dialogue_id: dialogue.automation.files.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 84
  workspace:
    files:
      - path: /workspace/solve.py
        editable: true
        content: |
          def solve() -> bool:
              blob = "10\n20\n"
              return False
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from solve import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/solve.py: "splitlines"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/solve.py: "return False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/solve.py: "splitlines"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Split lines.
  - level: 2
    text: Parse integers.
  - level: 3
    text: Use splitlines.
  - level: 4
    text: Return True when sum is 30.

rewards:
  clearance_points: 35
  mastery:
    python.files: 1
  unlocks:
    - lore.automation.files.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
