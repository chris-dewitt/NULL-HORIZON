schema_version: 1
mission_id: automation.regression_guard.01
version: 1.0.0
chapter_id: verification_chamber
title: Write a Regression Test
summary: Author a regression test for the valve clamp helper, then repair the bug
  so the suite passes.
difficulty: practiced
requirements:
  app_version: '>=0.1.0'
  online: true
  prerequisite_skills: []
skills:
  primary: python.testing
  secondary:
  - python.functions
  - python.conditionals
narrative:
  briefing_dialogue_id: dialogue.automation.regression_guard.briefing
  success_dialogue_id: dialogue.automation.regression_guard.success
  offline_fallback_dialogue_id: dialogue.automation.regression_guard.offline
tools:
- python_editor
- test_console
environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 21
  workspace:
    files:
    - path: /workspace/clamp.py
      editable: true
      content: "def clamp_psi(psi: int) -> int:\n    \"\"\"Clamp valve pressure into\
        \ the inclusive 0..100 band.\"\"\"\n    if psi < 0:\n        return 0\n  \
        \  if psi > 100:\n        return 99\n    return psi\n"
    - path: /workspace/test_clamp.py
      editable: true
      content: "from clamp import clamp_psi\n\n\ndef test_passthrough():\n    assert\
        \ clamp_psi(40) == 40\n"
    execution:
      provider: fake
      fixtures:
      - id: fixed
        match:
          file_contains:
            /workspace/test_clamp.py: clamp_psi(150) == 100
            /workspace/clamp.py: return 100
        result:
          status: completed
          tests:
          - id: test_passthrough
            status: passed
          - id: test_upper_bound
            status: passed
      - id: regression_fails_on_bug
        match:
          file_contains:
            /workspace/test_clamp.py: clamp_psi(150) == 100
            /workspace/clamp.py: return 99
        result:
          status: completed
          tests:
          - id: test_passthrough
            status: passed
          - id: test_upper_bound
            status: failed
            message: Expected 100 for over-range pressure
            expected: '100'
            actual: '99'
      - id: default_fail
        result:
          status: completed
          tests:
          - id: test_passthrough
            status: passed
          - id: test_upper_bound
            status: failed
            message: Add assert clamp_psi(150) == 100 then fix the upper bound
            expected: '100'
            actual: missing
objectives:
- id: author_regression
  type: file_assertion
  description: Add a regression assertion for clamp_psi(150) == 100.
  visible: true
  assert:
    file_contains:/workspace/test_clamp.py: clamp_psi(150) == 100
- id: fix_clamp
  type: file_assertion
  description: Fix clamp_psi so over-range values return 100.
  visible: true
  assert:
    file_contains:/workspace/clamp.py: return 100
    file_not_contains:/workspace/clamp.py: return 99
- id: tests_pass
  type: execution_tests
  description: Run tests and make the full suite pass.
  visible: true
  assert:
    all_passed: 'true'
    test_count: '2'
hints:
- level: 1
  text: Open test_clamp.py and add a test for the upper bound.
- level: 2
  text: Assert clamp_psi(150) == 100.
- level: 3
  text: The bug returns 99 for values above 100. Change that return to 100.
- level: 4
  text: Run tests after both edits. Both tests should pass.
rewards:
  clearance_points: 45
  mastery:
    python.testing: 1
    python.functions: 1
  unlocks:
  - lore.automation.regression_guard.01
completion:
  mode: all
  objective_ids:
  - author_regression
  - fix_clamp
  - tests_pass
