schema_version: 1
mission_id: archive.unsafe_query.01
version: 1.0.0
chapter_id: archive_core
title: Fix an Unsafe Query
summary: Replace a string-built crew lookup with a parameterized query helper.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: sql.safe_queries
  secondary:
    - python.functions

narrative:
  briefing_dialogue_id: dialogue.archive.unsafe_query.briefing
  success_dialogue_id: dialogue.archive.unsafe_query.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 33
  workspace:
    files:
      - path: /workspace/lookup.py
        editable: true
        content: |
          def find_crew_sql(callsign: str) -> str:
              """Return SQL that looks up a crew row by callsign."""
              return "SELECT * FROM crew WHERE callsign = '" + callsign + "'"
      - path: /workspace/test_lookup.py
        editable: false
        content: |
          from lookup import find_crew_sql


          def test_uses_placeholder():
              sql = find_crew_sql("ORION")
              assert "?" in sql
              assert "'" not in sql
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/lookup.py: "callsign = ?"
          result:
            status: completed
            tests:
              - id: test_uses_placeholder
                status: passed
        - id: still_concat
          match:
            file_contains:
              /workspace/lookup.py: "callsign = '"
          result:
            status: completed
            tests:
              - id: test_uses_placeholder
                status: failed
                message: Query still concatenates untrusted input
                expected: "placeholder ?"
                actual: "string concat"
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_uses_placeholder
                status: failed
                message: Query must use a ? placeholder

objectives:
  - id: use_placeholder
    type: file_assertion
    description: Build the lookup with a ? placeholder instead of string concat.
    visible: true
    assert:
      file_contains:/workspace/lookup.py: "callsign = ?"
      file_not_contains:/workspace/lookup.py: "callsign = '"
  - id: tests_pass
    type: execution_tests
    description: Run tests and confirm the safe query helper passes.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: The current helper concatenates callsign into SQL text.
  - level: 2
    text: Prefer a placeholder such as callsign = ?.
  - level: 3
    text: Remove the single-quoted concatenation entirely.
  - level: 4
    text: Return SELECT * FROM crew WHERE callsign = ? and run tests.

rewards:
  clearance_points: 40
  mastery:
    sql.safe_queries: 1
    python.functions: 1
  unlocks:
    - lore.archive.unsafe_query.01

completion:
  mode: all
  objective_ids:
    - use_placeholder
    - tests_pass
