schema_version: 1
mission_id: drone.compose.01
version: 1.0.0
chapter_id: drone_foundry
title: Compose Navigation
summary: Compose a navigator module into the drone.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: oop.composition
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.drone.compose.01.briefing
  success_dialogue_id: dialogue.drone.compose.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 92
  workspace:
    files:
      - path: /workspace/drone.py
        editable: true
        content: |
          class Navigator:
              def ok(self):
                  return True

          class Drone:
              def __init__(self):
                  pass

          def solve() -> bool:
              return hasattr(Drone(), 'nav') and Drone().nav.ok()
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from drone import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/drone.py: "self.nav = Navigator()"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/drone.py: "pass"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/drone.py: "self.nav = Navigator()"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Add a nav attribute.
  - level: 2
    text: Construct Navigator().
  - level: 3
    text: Compose, do not inherit.
  - level: 4
    text: self.nav = Navigator()

rewards:
  clearance_points: 35
  mastery:
    oop.composition: 1
  unlocks:
    - lore.drone.compose.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
