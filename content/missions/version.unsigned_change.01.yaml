schema_version: 1
mission_id: version.unsigned_change.01
version: 1.0.0
chapter_id: version_vault
title: Unsigned Change
summary: Find and discard an unauthorized working-tree edit in the Version Vault.
difficulty: introductory
requirements:
  app_version: '>=0.1.0'
  online: false
  prerequisite_skills: []
skills:
  primary: git.inspect
  secondary:
  - git.recover
narrative:
  briefing_dialogue_id: dialogue.version.unsigned_change.briefing
  success_dialogue_id: dialogue.version.unsigned_change.success
tools:
- git
environment:
  schema_version: 1
  template_id: git.repo.v1
  seed: 11
  git:
    initial_branch: main
    branches:
      main: c1
    commits:
    - id: c0
      message: Initial vault seed
      author: crew
      files:
        routing.conf: 'thruster_a=nominal

          thruster_b=nominal

          '
        README.md: 'Version Vault signed configs.

          '
    - id: c1
      message: Sign thruster routing
      author: orion
      parent: c0
      files:
        routing.conf: 'thruster_a=nominal

          thruster_b=standby

          '
        README.md: 'Version Vault signed configs.

          '
    working_tree:
      routing.conf: 'thruster_a=override

        thruster_b=standby

        '
objectives:
- id: inspect_status
  type: git_state
  description: Run git status and confirm the working tree is dirty.
  visible: true
  assert:
    last_command: git status
    working_tree_clean: false
    stdout_contains: routing.conf
- id: inspect_diff
  type: git_state
  description: Run git diff and confirm the unauthorized thruster_a override.
  visible: true
  assert:
    last_command: git diff
    stdout_contains: thruster_a=override
- id: restore_signed
  type: git_state
  description: Discard the unauthorized edit and restore the signed routing.conf.
  visible: true
  assert:
    working_tree_clean: true
    file_equals:routing.conf: 'thruster_a=nominal

      thruster_b=standby

      '
hints:
- level: 1
  text: Start with git status to see which file changed.
- level: 2
  text: Use git diff to read the unauthorized content.
- level: 3
  text: Restore a tracked file with git checkout -- routing.conf.
- level: 4
  text: After checkout, git status should report a clean working tree.
rewards:
  clearance_points: 35
  mastery:
    git.inspect: 1
    git.recover: 1
  unlocks:
  - lore.version.unsigned_change.01
completion:
  mode: all
  objective_ids:
  - inspect_status
  - inspect_diff
  - restore_signed
