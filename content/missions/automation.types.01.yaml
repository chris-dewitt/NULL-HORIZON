schema_version: 1
mission_id: automation.types.01
version: 1.0.0
chapter_id: automation_lab
title: Values and Types
summary: Fix a type-sensitive threshold helper.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: python.types
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.automation.types.01.briefing
  success_dialogue_id: dialogue.automation.types.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 80
  workspace:
    files:
      - path: /workspace/solve.py
        editable: true
        content: |
          def solve() -> bool:
              value = "7"
              return value == 7
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from solve import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/solve.py: "int(value)"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/solve.py: "return value == 7"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/solve.py: "int(value)"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Return an int.
  - level: 2
    text: Cast the value.
  - level: 3
    text: Use int(value).
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    python.types: 1
  unlocks:
    - lore.automation.types.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
