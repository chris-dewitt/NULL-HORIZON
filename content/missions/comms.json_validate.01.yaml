schema_version: 1
mission_id: comms.json_validate.01
version: 1.0.0
chapter_id: communications_spire
title: Validate JSON Payload
summary: Accept only payloads that include channel.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - api.http

skills:
  primary: api.json
  secondary:
    - python.functions

narrative:
  briefing_dialogue_id: dialogue.comms.json_validate.01.briefing
  success_dialogue_id: dialogue.comms.json_validate.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 112
  workspace:
    files:
      - path: /workspace/validate.py
        editable: true
        content: |
          def solve() -> bool:
              payload = {'channel': 'ops', 'msg': 'hi'}
              required = ['msg']
              return all(k in payload for k in required)
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from validate import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/validate.py: "channel"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/validate.py: "required = ['msg']"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/validate.py: "channel"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Include channel in required.
  - level: 2
    text: required = ['channel', 'msg']
  - level: 3
    text: Validate all required keys.
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    api.json: 1
  unlocks:
    - lore.comms.json_validate.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
