schema_version: 1
mission_id: mlops.monitoring.01
version: 1.0.0
chapter_id: prediction_observatory
title: Drift Monitor Alert
summary: Acknowledge drift and enable human review fallback.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - mlops.features

skills:
  primary: mlops.monitoring
  secondary:
    - mlops.features

narrative:
  briefing_dialogue_id: dialogue.mlops.monitoring.01.briefing
  success_dialogue_id: dialogue.mlops.monitoring.01.success

tools:
  - systems_panel

environment:
  schema_version: 1
  template_id: local.state.v1
  seed: 163
  initial_state:
    alert: open
    fallback: off
    handled: False
  actions:
    - id: ack
      label: Acknowledge drift alert
      effects:
        alert: acked
    - id: fallback
      label: Enable human review fallback
      requires:
        alert: acked
      effects:
        fallback: on
        handled: True

objectives:
  - id: ack
    type: state_assertion
    description: Acknowledge the alert.
    visible: true
    assert:
      alert: acked
  - id: fb
    type: state_assertion
    description: Enable human fallback.
    visible: true
    assert:
      fallback: on
      handled: True

hints:
  - level: 1
    text: Acknowledge first.
  - level: 2
    text: Enable human review.
  - level: 3
    text: Do not ignore drift.
  - level: 4
    text: Fallback protects navigation.

rewards:
  clearance_points: 25
  mastery:
    mlops.monitoring: 1
    mlops.features: 1
  unlocks:
    - lore.mlops.monitoring.01

completion:
  mode: all
  objective_ids:
    - ack
    - fb
