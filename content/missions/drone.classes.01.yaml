schema_version: 1
mission_id: drone.classes.01
version: 1.0.0
chapter_id: drone_foundry
title: Drone Class Basics
summary: Fix a drone class constructor default.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: oop.classes
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.drone.classes.01.briefing
  success_dialogue_id: dialogue.drone.classes.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 90
  workspace:
    files:
      - path: /workspace/drone.py
        editable: true
        content: |
          class Drone:
              def __init__(self):
                  self.ready = False

          def solve() -> bool:
              return Drone().ready is True
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from drone import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/drone.py: "ready=True"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/drone.py: "ready=False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/drone.py: "ready=True"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Drone should start ready.
  - level: 2
    text: Set ready=True.
  - level: 3
    text: Fix __init__.
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    oop.classes: 1
  unlocks:
    - lore.drone.classes.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
