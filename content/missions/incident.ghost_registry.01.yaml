schema_version: 1
mission_id: incident.ghost_registry.01
version: 1.0.0
chapter_id: incident_bridge
title: Ghost Registry Incident
summary: Combine terminal, SQL, and Git evidence to remove an unauthorized ghost crew patch.
difficulty: challenge

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: incident.triage
  secondary:
    - linux.inspection
    - sql.filter
    - git.recover

narrative:
  briefing_dialogue_id: dialogue.incident.ghost_registry.briefing
  success_dialogue_id: dialogue.incident.ghost_registry.success

tools:
  - terminal
  - sql
  - git

environment:
  schema_version: 1
  template_id: incident.multi.v1
  seed: 77
  filesystem:
    cwd: /home/operator
    entries:
      - path: /home/operator
        type: dir
      - path: /home/operator/incident.note
        type: file
        content: |
          Ghost registry alert.
          Suspect callsign: NYX-0
          Check crew SQL status, then restore signed registry.conf.
      - path: /var/log
        type: dir
      - path: /var/log/registry.alert
        type: file
        content: |
          WARN unsigned patch on registry.conf
          WARN ghost callsign NYX-0 present
  databases:
    - id: crew_registry
      policy: select_only
      seed_sql: |
        CREATE TABLE crew (
          crew_id INTEGER PRIMARY KEY,
          callsign TEXT NOT NULL,
          role TEXT NOT NULL,
          status TEXT NOT NULL
        );
        INSERT INTO crew (crew_id, callsign, role, status) VALUES
          (1, 'ORION', 'navigator', 'active'),
          (2, 'VEGA', 'engineer', 'missing'),
          (3, 'NYX-0', 'unknown', 'ghost');
  git:
    initial_branch: main
    branches:
      main: c1
    commits:
      - id: c0
        message: Seed signed registry
        author: orion
        files:
          registry.conf: |
            allow_ghosts=false
            source=signed
      - id: c1
        message: Sign registry policy
        author: orion
        parent: c0
        files:
          registry.conf: |
            allow_ghosts=false
            source=signed
    working_tree:
      registry.conf: |
        allow_ghosts=true
        source=unsigned

objectives:
  - id: read_alert
    type: command_output
    description: Read the registry alert and confirm the ghost callsign.
    visible: true
    assert:
      last_command: cat /var/log/registry.alert
      stdout_contains: NYX-0
      exit_code: 0
  - id: query_ghost
    type: sql_result
    description: Query the ghost crew row for NYX-0.
    visible: true
    assert:
      query_contains: NYX-0
      row_count: "1"
      columns: callsign,status
      rows: NYX-0|ghost
  - id: restore_policy
    type: git_state
    description: Discard the unsigned registry.conf change.
    visible: true
    assert:
      working_tree_clean: true
      file_equals:registry.conf: |
        allow_ghosts=false
        source=signed

hints:
  - level: 1
    text: Start in the terminal. The alert log is under /var/log.
  - level: 2
    text: Query crew for callsign NYX-0 and select callsign plus status.
  - level: 3
    text: Git status should show registry.conf as modified.
  - level: 4
    text: Restore the signed file with git checkout -- registry.conf.

rewards:
  clearance_points: 60
  mastery:
    incident.triage: 1
    linux.inspection: 1
    sql.filter: 1
    git.recover: 1
  unlocks:
    - lore.incident.ghost_registry.01

completion:
  mode: all
  objective_ids:
    - read_alert
    - query_ghost
    - restore_policy
