schema_version: 1
mission_id: nav.path_capstone.01
version: 1.0.0
chapter_id: navigation_array
title: Debris Path Budget
summary: Find a safe path under an execution budget.
difficulty: challenge

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - dsa.graphs
    - dsa.complexity

skills:
  primary: dsa.complexity
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.nav.path_capstone.01.briefing
  success_dialogue_id: dialogue.nav.path_capstone.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 106
  workspace:
    files:
      - path: /workspace/nav.py
        editable: true
        content: |
          def solve() -> bool:
              budget = 3
              cost = 5
              return cost <= budget
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from nav import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/nav.py: "cost = 3"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/nav.py: "cost = 5"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/nav.py: "cost = 3"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Respect the budget.
  - level: 2
    text: cost must be <= budget or reduce cost.
  - level: 3
    text: Set cost = 3
  - level: 4
    text: Return True when within budget.

rewards:
  clearance_points: 50
  mastery:
    dsa.complexity: 1
  unlocks:
    - lore.nav.path_capstone.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
