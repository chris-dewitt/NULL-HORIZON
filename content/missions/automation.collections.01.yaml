schema_version: 1
mission_id: automation.collections.01
version: 1.0.0
chapter_id: automation_lab
title: Collection Filter
summary: Keep only safe readings in a list.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - python.functions

skills:
  primary: python.collections
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.automation.collections.01.briefing
  success_dialogue_id: dialogue.automation.collections.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 82
  workspace:
    files:
      - path: /workspace/solve.py
        editable: true
        content: |
          def solve() -> bool:
              readings = [10, 80, 20]
              safe = readings
              return safe == [10, 20]
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from solve import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/solve.py: "x < 50"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/solve.py: "safe = readings"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/solve.py: "x < 50"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Filter readings.
  - level: 2
    text: Keep values under 50.
  - level: 3
    text: Use a list comprehension.
  - level: 4
    text: safe = [x for x in readings if x < 50]

rewards:
  clearance_points: 35
  mastery:
    python.collections: 1
  unlocks:
    - lore.automation.collections.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
