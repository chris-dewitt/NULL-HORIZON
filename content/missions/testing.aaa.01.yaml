schema_version: 1
mission_id: testing.aaa.01
version: 1.0.0
chapter_id: verification_chamber
title: Arrange Act Assert
summary: Complete the act and assert steps of a unit test helper.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - python.testing

skills:
  primary: testing.aaa
  secondary:
    - testing.unit

narrative:
  briefing_dialogue_id: dialogue.testing.aaa.01.briefing
  success_dialogue_id: dialogue.testing.aaa.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 121
  workspace:
    files:
      - path: /workspace/aaa.py
        editable: true
        content: |
          def solve() -> bool:
              arranged = True
              acted = False
              asserted = False
              return arranged and acted and asserted
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from aaa import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/aaa.py: "asserted = True"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/aaa.py: "asserted = False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/aaa.py: "asserted = True"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Keep arranged True.
  - level: 2
    text: Set acted = True.
  - level: 3
    text: Set asserted = True.
  - level: 4
    text: Return True when all three are True.

rewards:
  clearance_points: 35
  mastery:
    testing.aaa: 1
  unlocks:
    - lore.testing.aaa.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
