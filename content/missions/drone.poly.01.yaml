schema_version: 1
mission_id: drone.poly.01
version: 1.0.0
chapter_id: drone_foundry
title: Polymorphic Repair
summary: Dispatch repair through a shared interface.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: oop.polymorphism
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.drone.poly.01.briefing
  success_dialogue_id: dialogue.drone.poly.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 93
  workspace:
    files:
      - path: /workspace/drone.py
        editable: true
        content: |
          class Tool:
              def repair(self):
                  return True

          def solve() -> bool:
              tool = Tool()
              return False
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from drone import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/drone.py: "tool.repair()"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/drone.py: "return False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/drone.py: "tool.repair()"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Call repair on the tool.
  - level: 2
    text: return tool.repair()
  - level: 3
    text: Do not hardcode True.
  - level: 4
    text: Run tests.

rewards:
  clearance_points: 35
  mastery:
    oop.polymorphism: 1
  unlocks:
    - lore.drone.poly.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
