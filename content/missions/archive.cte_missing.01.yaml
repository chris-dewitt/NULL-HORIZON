schema_version: 1
mission_id: archive.cte_missing.01
version: 1.0.0
chapter_id: archive_core
title: CTE for Missing Crew
summary: Use a CTE to list missing callsigns.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - sql.join

skills:
  primary: sql.subquery
  secondary:
    - sql.filter

narrative:
  briefing_dialogue_id: dialogue.archive.cte_missing.01.briefing
  success_dialogue_id: dialogue.archive.cte_missing.01.success

tools:
  - sql

environment:
  schema_version: 1
  template_id: sql.sqlite.v1
  seed: 74
  databases:
    - id: archive
      policy: select_only
      seed_sql: |
        CREATE TABLE crew (crew_id INTEGER PRIMARY KEY, callsign TEXT, role TEXT, status TEXT, deck TEXT);
        CREATE TABLE pods (pod_id INTEGER PRIMARY KEY, deck TEXT, occupied INTEGER);
        INSERT INTO pods VALUES (1,'A',1),(2,'A',1),(3,'B',1),(4,'B',0);
        INSERT INTO crew VALUES
         (1,'ORION','navigator','active','A'),
         (2,'VEGA','engineer','active','A'),
         (3,'KELL','medic','missing','B'),
         (4,'RIN','engineer','missing','B'),
         (5,'NYX','unknown','ghost','B');
objectives:
  - id: cte
    type: sql_result
    description: Use WITH to select missing callsigns.
    visible: true
    assert:
      query_contains: WITH
      columns: callsign
      row_count: "2"

hints:
  - level: 1
    text: Start with WITH missing AS (...).
  - level: 2
    text: Filter status missing.
  - level: 3
    text: Select callsign from the CTE.
  - level: 4
    text: WITH missing AS (SELECT callsign FROM crew WHERE status = 'missing') SELECT callsign FROM missing;

rewards:
  clearance_points: 35
  mastery:
    sql.subquery: 1
  unlocks:
    - lore.archive.cte_missing.01

completion:
  mode: all
  objective_ids:
    - cte
