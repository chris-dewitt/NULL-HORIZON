schema_version: 1
mission_id: comms.http_methods.01
version: 1.0.0
chapter_id: communications_spire
title: HTTP Method Gate
summary: Route a safe GET health check away from a mutating POST.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - systems.api_trace

skills:
  primary: api.http
  secondary:
    - systems.api_trace

narrative:
  briefing_dialogue_id: dialogue.comms.http_methods.01.briefing
  success_dialogue_id: dialogue.comms.http_methods.01.success

tools:
  - service_map

environment:
  schema_version: 1
  template_id: service_map.v1
  seed: 111
  service_map:
    nodes:
      - id: client
        kind: client
        label: Console
        status: degraded
      - id: api
        kind: api
        label: Comms API
        status: healthy
    edges:
      - id: c_to_a
        from: client
        to: api
        kind: request
        status: degraded
    actions:
      - id: prefer_get
        label: Use GET /health
        effects:
          method: "GET"
          inspected: "true"
      - id: confirm
        label: Confirm 200 health
        requires:
          inspected: "true"
        effects:
          node.client.status: "healthy"
          edge.c_to_a.status: "ok"
          ok: "true"

objectives:
  - id: get
    type: service_map_state
    description: Prefer GET for health checks.
    visible: true
    assert:
      method: GET
  - id: healthy
    type: service_map_state
    description: Confirm the health path is healthy.
    visible: true
    assert:
      ok: "true"

hints:
  - level: 1
    text: Health checks should be GET.
  - level: 2
    text: Select GET /health.
  - level: 3
    text: Confirm a 200-style healthy path.
  - level: 4
    text: Avoid POST for health.

rewards:
  clearance_points: 40
  mastery:
    api.http: 1
  unlocks:
    - lore.comms.http_methods.01

completion:
  mode: all
  objective_ids:
    - get
    - healthy
