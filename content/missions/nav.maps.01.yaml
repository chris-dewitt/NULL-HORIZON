schema_version: 1
mission_id: nav.maps.01
version: 1.0.0
chapter_id: navigation_array
title: Hash Map Lookup
summary: Resolve a sector name from a map.
difficulty: practiced

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills:
    - dsa.lists

skills:
  primary: dsa.maps
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.nav.maps.01.briefing
  success_dialogue_id: dialogue.nav.maps.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 102
  workspace:
    files:
      - path: /workspace/nav.py
        editable: true
        content: |
          def solve() -> bool:
              sectors = {'A': 1, 'B': 2}
              return False
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from nav import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/nav.py: "sectors["
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/nav.py: "return False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/nav.py: "sectors["
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Look up key B.
  - level: 2
    text: Use sectors['B'] or get.
  - level: 3
    text: Ensure lookup works.
  - level: 4
    text: Return True.

rewards:
  clearance_points: 35
  mastery:
    dsa.maps: 1
  unlocks:
    - lore.nav.maps.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
