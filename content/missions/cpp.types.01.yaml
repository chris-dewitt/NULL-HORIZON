schema_version: 1
mission_id: cpp.types.01
version: 1.0.0
chapter_id: reactor_kernel
title: C++ Types Warmup
summary: Fix a fictional C++ helper return type comment and value.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: cpp.types
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.cpp.types.01.briefing
  success_dialogue_id: dialogue.cpp.types.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 150
  workspace:
    files:
      - path: /workspace/thermal.py
        editable: true
        content: |
          def solve() -> bool:
              # int solve() { return 0; }
              return False
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from thermal import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/thermal.py: "return True"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/thermal.py: "return False"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required C++ concept fix.
    visible: true
    assert:
      file_contains:/workspace/thermal.py: "return True"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Return success as 1.
  - level: 2
    text: Change return 0.
  - level: 3
    text: return 1;
  - level: 4
    text: Run fixtures.

rewards:
  clearance_points: 35
  mastery:
    cpp.types: 1
  unlocks:
    - lore.cpp.types.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
