schema_version: 1
mission_id: nav.lists.01
version: 1.0.0
chapter_id: navigation_array
title: List Path Buffer
summary: Keep only valid sector ids in a list.
difficulty: introductory

requirements:
  app_version: ">=0.1.0"
  online: false
  prerequisite_skills: []

skills:
  primary: dsa.lists
  secondary: []

narrative:
  briefing_dialogue_id: dialogue.nav.lists.01.briefing
  success_dialogue_id: dialogue.nav.lists.01.success

tools:
  - python_editor
  - test_console

environment:
  schema_version: 1
  template_id: python.editor.fake.v1
  seed: 100
  workspace:
    files:
      - path: /workspace/nav.py
        editable: true
        content: |
          def solve() -> bool:
              sectors = [0, 2, -1, 4]
              valid = sectors
              return valid == [2, 4]
      - path: /workspace/test_solve.py
        editable: false
        content: |
          from nav import solve


          def test_solve():
              assert solve() is True
    execution:
      provider: fake
      fixtures:
        - id: fixed
          match:
            file_contains:
              /workspace/nav.py: "x > 0"
          result:
            status: completed
            tests:
              - id: test_solve
                status: passed
        - id: broken
          match:
            file_contains:
              /workspace/nav.py: "valid = sectors"
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Behavior still incorrect
        - id: default_fail
          result:
            status: completed
            tests:
              - id: test_solve
                status: failed
                message: Unexpected workspace state

objectives:
  - id: apply_fix
    type: file_assertion
    description: Apply the required Python fix.
    visible: true
    assert:
      file_contains:/workspace/nav.py: "x > 0"
  - id: tests_pass
    type: execution_tests
    description: Run tests and make them pass.
    visible: true
    assert:
      all_passed: "true"
      test_count: "1"

hints:
  - level: 1
    text: Filter positive ids.
  - level: 2
    text: Use a comprehension.
  - level: 3
    text: x > 0
  - level: 4
    text: Return True when filtered.

rewards:
  clearance_points: 35
  mastery:
    dsa.lists: 1
  unlocks:
    - lore.nav.lists.01

completion:
  mode: all
  objective_ids:
    - apply_fix
    - tests_pass
